<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="910" y2="950" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10C4D8"/>
      <stop offset="1" stop-color="#053A89"/>
    </linearGradient>
    <linearGradient id="board" x1="220" y1="260" x2="800" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE86A"/>
      <stop offset="1" stop-color="#FFC91F"/>
    </linearGradient>
    <linearGradient id="piece" x1="470" y1="270" x2="560" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF526B"/>
      <stop offset="1" stop-color="#D30D34"/>
    </linearGradient>
    <linearGradient id="well" x1="280" y1="300" x2="780" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C5AA8"/>
      <stop offset="1" stop-color="#05336C"/>
    </linearGradient>
    <filter id="shadow" x="95" y="95" width="834" height="834" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#001B48" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="80" y="80" width="864" height="864" rx="180" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="824" rx="160" stroke="#9CEBFF" stroke-opacity="0.45" stroke-width="8"/>

  <g filter="url(#shadow)">
    <rect x="185" y="220" width="250" height="610" rx="42" fill="url(#board)"/>
    <rect x="589" y="220" width="250" height="610" rx="42" fill="url(#board)"/>
    <rect x="462" y="170" width="100" height="700" rx="45" fill="url(#piece)"/>
  </g>

  <g fill="url(#well)">
    <circle cx="245" cy="330" r="40"/>
    <circle cx="335" cy="330" r="40"/>
    <circle cx="245" cy="450" r="40"/>
    <circle cx="335" cy="450" r="40"/>
    <circle cx="245" cy="570" r="40"/>
    <circle cx="335" cy="570" r="40"/>
    <circle cx="245" cy="690" r="40"/>
    <circle cx="335" cy="690" r="40"/>

    <circle cx="649" cy="330" r="40"/>
    <circle cx="739" cy="330" r="40"/>
    <circle cx="649" cy="450" r="40"/>
    <circle cx="739" cy="450" r="40"/>
    <circle cx="649" cy="570" r="40"/>
    <circle cx="739" cy="570" r="40"/>
    <circle cx="649" cy="690" r="40"/>
    <circle cx="739" cy="690" r="40"/>
  </g>

  <g fill="url(#piece)">
    <circle cx="512" cy="250" r="42"/>
    <circle cx="512" cy="370" r="42"/>
    <circle cx="512" cy="490" r="42"/>
    <circle cx="512" cy="610" r="42"/>
    <circle cx="512" cy="730" r="42"/>
  </g>

  <g fill="#FFF" opacity="0.24">
    <circle cx="500" cy="235" r="15"/>
    <circle cx="500" cy="355" r="15"/>
    <circle cx="500" cy="475" r="15"/>
    <circle cx="500" cy="595" r="15"/>
    <circle cx="500" cy="715" r="15"/>
  </g>
</svg>
